{%extends 'base.html' %} 
{%block title%}Animal{% endblock %}
{%block my_content%}
<table class="table table-dark table-stripped">
    <thead>
        <tr>
            <th>id</th>
            <th>Имя</th>
            <th>Вид</th>
            <th>Возраст</th>
            <th>Состояние здоровья</th>
            <th>Вольер</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>{{ animal.id }}</td>
            <td>{{ animal.name }}</td>
            <td>{{ animal.species }}</td>
            <td>{{ animal.age }}</td>
            <td>{{ animal.health }}</td>
            <td>{{ animal.enclosure_id }}</td>
        </tr>
    </tbody>
</table>
{% endblock %}
